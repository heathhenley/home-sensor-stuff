esphome:
  name: test

esp32:
  board: seeed_xiao_esp32c3
  framework:
    type: arduino

logger:
  level: DEBUG

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password


external_components:
  - source:
      type: local
      path: components
    components: [ adxl345 ]

i2c:
  sda: GPIO6
  scl: GPIO7
  frequency: 400kHz
  scan: true

adxl345:
  - id: accel
    address: 0x53
    update_interval: 500ms
    range: 4G
    full_res: true
    accel_x:
      id: x
      name: "Accel X"
    accel_y:
      id: y
      name: "Accel Y"
    accel_z:
      id: z
      name: "Accel Z"

    activity:
      threshold_g: 1.0
      # AC or DC, default is AC - AC picks a value at start as a ref and
      # compares the difference between the current value and the ref value
      # against the threshold - DC is comparing the current value against the
      # threshold directly
      coupling: AC
      axis: [x, y, z] # which axes to monitor, default is all
      binary_sensor:
        id: activity
        name: "Activity"



interval:
  - interval: 500ms
    then:
      - logger.log:
          format: "X=%.3f Y=%.3f Z=%.3f, Activity=%d"
          args: [ 'id(x).state', 'id(y).state', 'id(z).state', 'id(activity).state' ]


