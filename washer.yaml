esphome:
  name: washer

esp32:
  board: seeed_xiao_esp32c3
  framework:
    type: arduino

logger:
  level: DEBUG

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:
ota:
  - platform: esphome

external_components:
  - source:
      type: git
      url: https://github.com/jdillenburg/esphome
      ref: main
    components: [ adxl345 ]

i2c:
  sda: GPIO6
  scl: GPIO7
  frequency: 400kHz
  scan: true      # logs "Found i2c device at 0x53" on boot

adxl345:
  - id: accel
    address: 0x53
    update_interval: 500ms
    range: 4G
    jitter:
      id: jitter
      name: "Jitter"

binary_sensor:
  - platform: template
    name: "Running"
    id: dryer_running
    publish_initial_state: true
    lambda: |-
      return id(jitter).state > id(jitter_threshold).state;
    filters:
      - delayed_off: 20min

number:
  - platform: template
    name: "Jitter Threshold"
    id: jitter_threshold
    optimistic: true
    min_value: 0
    max_value: 20
    step: 0.5
    initial_value: 6.5
    restore_value: true
