esphome:
  name: dryer

esp32:
  board: seeed_xiao_esp32c3
  framework:
    type: arduino

logger:
  level: DEBUG

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:
ota:
  - platform: esphome

external_components:
  - source:
      type: local
      path: components
    components: [ adxl345 ]

i2c:
  sda: GPIO6
  scl: GPIO7
  frequency: 400kHz
  scan: true      # logs "Found i2c device at 0x53" on boot

adxl345:
  - id: accel
    address: 0x53
    update_interval: 500ms
    range: 4G
    full_res: true
    accel_x:
      id: x
      name: "Acceleration X"
      unit_of_measurement: "m/s²"
      filters:
        - multiply: 9.80665
    accel_y:
      id: y
      name: "Acceleration Y"
      unit_of_measurement: "m/s²"
      filters:
        - multiply: 9.80665
    accel_z:
      id: z
      name: "Acceleration Z"
      unit_of_measurement: "m/s²"
      filters:
        - multiply: 9.80665

    activity:
      threshold_g: 0.3
      coupling: AC
      axis: [x, y, z]
      binary_sensor:
        id: activity
        name: "Motion"
        filters:
          - delayed_off: 30sec

sensor:
  - platform: template
    id: smoothed_jitter
    update_interval: 500ms
    name: "Smoothed Jitter"
    state_class: measurement
    unit_of_measurement: "m/s²"
    lambda: |-
      return fabs(id(x).state) + fabs(id(y).state) + fabs(id(z).state);
    filters:
      - sliding_window_moving_average:
          window_size: 60
          send_every: 5

binary_sensor:
  - platform: template
    name: "Running"
    id: dryer_running
    publish_initial_state: true
    lambda: |-
      return id(smoothed_jitter).state > id(jitter_threshold).state;
    filters:
      - delayed_off: 20min
      - delayed_on: 10sec

number:
  - platform: template
    name: "Jitter Threshold"
    id: jitter_threshold
    optimistic: true
    min_value: 9
    max_value: 20
    step: 0.05
    initial_value: 11.0
    restore_value: true
